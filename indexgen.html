<!DOCTYPE html>
<html>
<head>
<title>AI Content Engine Blue</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #071427;
  color: white;
}

/* HEADER */
header {
  background: #0b2a4a;
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #1b4d7a;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
  background: #0b1b2f;
  padding: 15px;
  border-right: 1px solid #1b4d7a;
}

input, button, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  outline: none;
}

input, select {
  background: #102a46;
  color: white;
}

button {
  background: #1e88ff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #4aa3ff;
}

/* MAIN */
.main {
  padding: 20px;
  overflow-y: auto;
}

/* CARDS */
.card {
  background: #0f2a44;
  border: 1px solid #1b4d7a;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
}

.stat-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.stat {
  flex: 1;
  background: #0b1f36;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  border: 1px solid #1b4d7a;
}

.badge {
  background: #1e88ff;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
}

small { color: #9bb7d4; }
hr { border: 0.5px solid #1b4d7a; }
</style>
</head>

<body>

<header>💙 AI Content Engine BLUE PRO</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>📁 Boards</h3>

<input id="boardName" placeholder="New board">
<button onclick="createBoard()">Create Board</button>

<select id="boardSelect"></select>

<hr>

<h3>⚡ Generator</h3>

<input id="prompt" placeholder="Enter prompt">

<button onclick="generateText()">Generate Text</button>
<button onclick="generateImage()">Generate Image</button>

<hr>
<hr>

<h3>🖼 Image Preview</h3>
<div id="previewBox" style="
  width:100%;
  height:160px;
  background:#0b1f36;
  border:1px solid #1e88ff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#9bb7d4;
  text-align:center;
">
No image generated
</div>

<button onclick="postPreview()">Post Preview</button>

<h3>⏰ Schedule</h3>

<input id="scheduleTime" type="datetime-local">
<button onclick="schedulePost()">Schedule Post</button>

</div>

<!-- MAIN -->
<div class="main">

<h2>📊 Analytics</h2>

<div class="stat-box" id="analytics"></div>

<h2>🧠 Feed</h2>

<div id="output"></div>

</div>
</div>

<script>

// ---------------- DATABASE ----------------
let db = JSON.parse(localStorage.getItem("blue_engine") || "{}");

// ---------------- SAVE ----------------
function save() {
  localStorage.setItem("blue_engine", JSON.stringify(db));
  updateBoards();
  render();
  renderAnalytics();
}

// ---------------- BOARD ----------------
function createBoard() {
  let name = document.getElementById("boardName").value;
  if (!name) return;

  if (!db[name]) {
    db[name] = {
      posts: [],
      views: 0,
      created: Date.now()
    };
  }

  save();
}

// ---------------- BOARD LIST ----------------
function updateBoards() {
  let sel = document.getElementById("boardSelect");
  sel.innerHTML = "";

  for (let b in db) {
    let opt = document.createElement("option");
    opt.value = b;
    opt.innerText = b;
    sel.appendChild(opt);
  }
}

// ---------------- HELPERS ----------------
function getPrompt() {
  return document.getElementById("prompt").value;
}

function getBoard() {
  return document.getElementById("boardSelect").value;
}

function getTime() {
  return document.getElementById("scheduleTime").value;
}

// ---------------- AI ENGINE ----------------
function ai(prompt, type) {
  if (type === "image") {
    return "🖼 AI IMAGE → " + prompt + " | ultra HD | cinematic | blue aesthetic";
  }
  return "🧠 AI TEXT → " + prompt + " | optimized for engagement & SEO";
}

// ---------------- VIRAL SCORE ----------------
function viral() {
  return Math.floor(Math.random() * 100);
}

// ---------------- GENERATE ----------------
function generateText() {
  let p = getPrompt();
  let b = getBoard();
  if (!p || !b) return alert("Missing data");

  db[b].posts.push({
    type: "text",
    content: ai(p, "text"),
    views: 0,
    viral: viral(),
    time: Date.now(),
    status: "posted"
  });

  save();
}

function generateImage() {
  let p = getPrompt();
  if (!p) return alert("Enter a prompt");

  preview = {
    type: "image",
    prompt: p,
    // REAL VISUAL OUTPUT (no longer text-only)
    url: "https://image.pollinations.ai/prompt/" + encodeURIComponent(p)
  };

  document.getElementById("previewBox").innerHTML = `
    <img src="${preview.url}" style="
      width:100%;
      height:160px;
      object-fit:cover;
      border-radius:10px;
    " />
    <div style="margin-top:5px; font-size:12px;">
      ${p}
    </div>
  `;
}


// ---------------- SCHEDULING ----------------
function schedulePost() {
  let p = getPrompt();
  let b = getBoard();
  let t = new Date(getTime()).getTime();

  if (!p || !b || !t) return alert("Missing schedule data");

  db[b].posts.push({
    type: "scheduled",
    content: ai(p, "text"),
    views: 0,
    viral: viral(),
    time: t,
    status: "pending"
  });

  save();
}

// AUTO PUBLISH ENGINE
setInterval(() => {
  let now = Date.now();

  for (let b in db) {
    db[b].posts.forEach(p => {
      if (p.status === "pending" && now >= p.time) {
        p.status = "posted";
      }
    });
  }

  save();
}, 5000);

// ---------------- ANALYTICS ----------------
function renderAnalytics() {
  let posts = 0;
  let views = 0;
  let boards = Object.keys(db).length;

  for (let b in db) {
    posts += db[b].posts.length;
    views += db[b].views;
  }

  document.getElementById("analytics").innerHTML = `
    <div class="stat">📦 Posts<br><b>${posts}</b></div>
    <div class="stat">👁 Views<br><b>${views}</b></div>
    <div class="stat">📁 Boards<br><b>${boards}</b></div>
  `;
}

// ---------------- VIEWS ----------------
function addView(board, i) {
  db[board].posts[i].views++;
  db[board].views++;
  save();
}

// ---------------- RENDER ----------------
function render() {
  let out = document.getElementById("output");
  out.innerHTML = "";

  for (let b in db) {

    let box = document.createElement("div");
    box.className = "card";

    box.innerHTML = `<h3>${b}</h3><small>${db[b].posts.length} posts</small><hr>`;

    db[b].posts.forEach((p, i) => {

      box.innerHTML += `
        ${p.viral > 70 ? '<span class="badge">🔥 VIRAL</span>' : ''}
        <b>${p.type.toUpperCase()}</b><br>
        ${p.content}<br>
        <small>${p.status}</small><br>
        👁 ${p.views}
        <button onclick="addView('${b}',${i})">+1 View</button>
        <hr>
      `;
    });

    out.appendChild(box);
  }
}

// INIT
updateBoards();
render();
renderAnalytics();

</script>

</body>
</html>
